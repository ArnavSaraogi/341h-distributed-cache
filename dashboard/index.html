<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Cache Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            padding: 6px 14px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #21262d;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s;
        }
        button:hover { background: #30363d; }

        .btn-start { border-color: #238636; color: #3fb950; }
        .btn-start:hover { background: #238636; color: #fff; }

        .btn-stop { border-color: #da3633; color: #f85149; }
        .btn-stop:hover { background: #da3633; color: #fff; }

        .btn-stop-all { border-color: #da3633; color: #f85149; font-weight: 600; }
        .btn-stop-all:hover { background: #da3633; color: #fff; }

        .port-input {
            width: 60px;
            padding: 6px 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
            text-align: center;
        }
        .port-input::placeholder { color: #484f58; }

        select {
            padding: 6px 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
        }

        .separator {
            width: 1px;
            height: 24px;
            background: #30363d;
            margin: 0 4px;
        }

        .command-bar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .command-bar label { font-size: 13px; color: #8b949e; white-space: nowrap; }
        .command-input {
            flex: 1;
            padding: 6px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .command-input::placeholder { color: #484f58; }
        .command-result {
            font-size: 12px;
            color: #8b949e;
            font-family: 'SF Mono', 'Fira Code', monospace;
            max-width: 50%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .command-result.success { color: #3fb950; }
        .command-result.error { color: #f85149; }

        .panels {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            overflow: auto;
            padding: 0;
        }

        .panel {
            flex: 1 1 400px;
            min-width: 350px;
            max-height: 50vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #30363d;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
        }
        .panel-title {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            display: inline-block;
        }
        .status-dot.stopped { background: #f85149; }

        .panel-stop {
            padding: 3px 10px;
            font-size: 11px;
            border-color: #da3633;
            color: #f85149;
        }
        .panel-stop:hover { background: #da3633; color: #fff; }

        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            background: #0d1117;
        }
        .log-line { color: #8b949e; white-space: pre-wrap; word-break: break-all; }
        .log-line.highlight { color: #c9d1d9; }
        .log-line.error { color: #f85149; }
        .log-line.info { color: #58a6ff; }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #484f58;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Distributed Cache Dashboard</h1>
        <div class="controls">
            <button class="btn-start" onclick="startProcess('config')">Start Config Service</button>
            <div class="separator"></div>
            <button class="btn-start" onclick="startCache()">Add Cache</button>
            <input type="text" class="port-input" id="cachePortInput" placeholder="auto">
            <div class="separator"></div>
            <button class="btn-start" onclick="startClient()">Add Client</button>
            <input type="text" class="port-input" id="clientPortInput" placeholder="auto">
            <div class="separator"></div>
            <button class="btn-stop-all" onclick="stopAll()">Stop All</button>
        </div>
    </header>
    <div class="command-bar">
        <label>Send Command via</label>
        <select id="clientSelect">
            <option value="">No clients running</option>
        </select>
        <input type="text" class="command-input" id="commandInput" placeholder="GET jayleen  or  PUT key value" onkeydown="if(event.key==='Enter')sendCommand()">
        <button class="btn-start" onclick="sendCommand()">Send</button>
        <span class="command-result" id="commandResult"></span>
    </div>
    <div class="panels" id="panels">
        <div class="empty-state" id="emptyState">Start a service to see its logs here</div>
    </div>

    <script>
        const panels = {};
        const runningClients = {}; // track running clients for the dropdown

        function updateClientDropdown() {
            const select = document.getElementById('clientSelect');
            const currentValue = select.value;
            select.innerHTML = '';
            const names = Object.keys(runningClients);
            if (names.length === 0) {
                select.innerHTML = '<option value="">No clients running</option>';
            } else {
                for (const name of names) {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = 'Client :' + runningClients[name];
                    select.appendChild(opt);
                }
                // Restore previous selection if still valid
                if (names.includes(currentValue)) {
                    select.value = currentValue;
                }
            }
        }

        async function startProcess(type, port) {
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type, port: port || ''})
                });
                if (!res.ok) {
                    alert(await res.text());
                    return;
                }
                const data = await res.json();
                createPanel(data.name, type, data.port);
            } catch (e) {
                alert('Failed to start: ' + e.message);
            }
        }

        function startCache() {
            const portInput = document.getElementById('cachePortInput');
            const port = portInput.value.trim();
            startProcess('cache', port);
            portInput.value = '';
        }

        function startClient() {
            const portInput = document.getElementById('clientPortInput');
            const port = portInput.value.trim();
            startProcess('client', port);
            portInput.value = '';
        }

        async function stopProcess(name) {
            try {
                await fetch('/api/stop', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name})
                });
            } catch (e) {
                alert('Failed to stop: ' + e.message);
            }
        }

        async function stopAll() {
            try {
                await fetch('/api/stop-all', {method: 'POST'});
            } catch (e) {
                alert('Failed to stop all: ' + e.message);
            }
        }

        function createPanel(name, type, port) {
            document.getElementById('emptyState')?.remove();

            if (panels[name]) return; // already exists

            // Track clients for dropdown
            if (type === 'client') {
                runningClients[name] = port;
                updateClientDropdown();
            }

            const panel = document.createElement('div');
            panel.className = 'panel';
            panel.id = 'panel-' + name;

            let label = name;
            if (type === 'config') label = 'Config Service';
            else if (type === 'cache') label = 'Cache :' + port;
            else if (type === 'client') label = 'Client :' + port;

            panel.innerHTML = `
                <div class="panel-header">
                    <span class="panel-title">
                        <span class="status-dot" id="dot-${name}"></span>
                        ${label}
                    </span>
                    <button class="panel-stop" onclick="stopProcess('${name}')">Stop</button>
                </div>
                <div class="log-container" id="logs-${name}"></div>
            `;

            document.getElementById('panels').appendChild(panel);

            // Connect SSE
            const es = new EventSource('/api/logs?name=' + encodeURIComponent(name));
            let userScrolled = false;
            const logEl = panel.querySelector('.log-container');

            logEl.addEventListener('scroll', () => {
                const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 30;
                userScrolled = !atBottom;
            });

            es.onmessage = (e) => {
                const line = document.createElement('div');
                line.className = 'log-line';
                const text = e.data;

                if (text.includes('ERROR') || text.includes('error') || text.includes('panic')) {
                    line.className += ' error';
                } else if (text.includes('[process exited]')) {
                    line.className += ' error';
                    const dot = document.getElementById('dot-' + name);
                    if (dot) dot.className = 'status-dot stopped';
                    // Remove from client dropdown if it was a client
                    if (type === 'client') {
                        delete runningClients[name];
                        updateClientDropdown();
                    }
                } else if (text.includes('Started') || text.includes('Added') || text.includes('Sent') || text.includes('Listening')) {
                    line.className += ' info';
                } else {
                    line.className += ' highlight';
                }

                line.textContent = text;
                logEl.appendChild(line);

                if (!userScrolled) {
                    logEl.scrollTop = logEl.scrollHeight;
                }
            };

            es.onerror = () => {
                es.close();
                const dot = document.getElementById('dot-' + name);
                if (dot) dot.className = 'status-dot stopped';
                if (type === 'client') {
                    delete runningClients[name];
                    updateClientDropdown();
                }
            };

            panels[name] = { es, panel };
        }

        async function sendCommand() {
            const input = document.getElementById('commandInput');
            const result = document.getElementById('commandResult');
            const clientSelect = document.getElementById('clientSelect');
            const cmd = input.value.trim();
            if (!cmd) return;

            const client = clientSelect.value;
            if (!client) {
                result.textContent = 'Start a client first';
                result.className = 'command-result error';
                return;
            }

            result.textContent = 'sending...';
            result.className = 'command-result';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd, client: client})
                });
                if (!res.ok) {
                    result.textContent = await res.text();
                    result.className = 'command-result error';
                    return;
                }
                const data = await res.json();
                result.textContent = `[${data.target}] ${data.response}`;
                result.className = 'command-result success';
            } catch (e) {
                result.textContent = e.message;
                result.className = 'command-result error';
            }
            input.value = '';
        }

        // On load, check for already-running processes
        async function refreshProcesses() {
            try {
                const res = await fetch('/api/processes');
                const procs = await res.json();
                if (procs) {
                    for (const p of procs) {
                        createPanel(p.name, p.type, p.port);
                    }
                }
            } catch (e) {}
        }
        refreshProcesses();
    </script>
</body>
</html>
