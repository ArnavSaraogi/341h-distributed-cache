<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Cache Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
            background: #262626;
            color: #BCBCBC;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button {
            padding: 6px 14px;
            border: 1px solid #444444;
            border-radius: 6px;
            background: #1C1C1C;
            color: #BCBCBC;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s;
        }
        button:hover { background: #444444; }

        .btn-start { border-color: #5F875F; color: #87AF87; }
        .btn-start:hover { background: #5F875F; color: #FFFFFF; }

        .btn-stop-all {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            border-color: #AF5F5F;
            color: #AF5F5F;
            font-weight: 600;
            padding: 10px 20px;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .btn-stop-all:hover { background: #AF5F5F; color: #FFFFFF; }

        /* Main 3-column layout with draggable dividers */
        .main-grid {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .section {
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 100px;
            overflow: hidden;
        }

        .resize-handle {
            width: 5px;
            cursor: col-resize;
            background: #444444;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .resize-handle:hover, .resize-handle.active {
            background: #5F87AF;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #1C1C1C;
            border-bottom: 1px solid #444444;
            flex-shrink: 0;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #87875F;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-header .btn-start { font-size: 11px; padding: 4px 10px; }

        .section-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .section-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6C6C6C;
            font-size: 13px;
        }

        /* Panels */
        .panel {
            display: flex;
            flex-direction: column;
            height: 250px;
            flex-shrink: 0;
            border: 1px solid #444444;
            border-radius: 6px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #1C1C1C;
            border-bottom: 1px solid #444444;
            flex-shrink: 0;
        }
        .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: #BCBCBC;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-stop {
            padding: 3px 10px;
            font-size: 11px;
            border-color: #AF5F5F;
            color: #AF5F5F;
        }
        .panel-stop:hover { background: #AF5F5F; color: #FFFFFF; }

        .panel-delete {
            padding: 3px 10px;
            font-size: 11px;
            border-color: #444444;
            color: #6C6C6C;
            cursor: pointer;
        }
        .panel-delete:hover { background: #AF5F5F; color: #FFFFFF; border-color: #AF5F5F; }

        /* Client command bar inside panel */
        .panel-command-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 6px 12px;
            background: #1C1C1C;
            border-bottom: 1px solid #444444;
            flex-shrink: 0;
        }
        .panel-command-input {
            flex: 1;
            padding: 4px 8px;
            background: #262626;
            border: 1px solid #444444;
            border-radius: 4px;
            color: #BCBCBC;
            font-size: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .panel-command-input::placeholder { color: #6C6C6C; }
        .panel-command-bar .btn-start { font-size: 11px; padding: 3px 8px; }
        .command-result {
            font-size: 11px;
            color: #6C6C6C;
            font-family: 'SF Mono', 'Fira Code', monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
        .command-result.success { color: #87AF87; }
        .command-result.error { color: #AF5F5F; }

        /* Log container */
        .log-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            background: #1C1C1C;
        }
        .log-line { color: #6C6C6C; white-space: pre-wrap; word-break: break-all; }
        .log-line.highlight { color: #BCBCBC; }
        .log-line.error { color: #AF5F5F; }
        .log-line.info { color: #5F87AF; }
    </style>
</head>
<body>
    <button class="btn-stop-all" id="stopAllBtn" onclick="handleStopAll()">Stop All</button>
    <div class="main-grid" id="mainGrid">
        <div class="section" id="config-section" style="flex: 1;">
            <div class="section-header">
                <span class="section-title">Config Service</span>
                <button class="btn-start" id="config-start-btn" onclick="startConfig()">Start</button>
                <button class="panel-stop" id="config-stop-btn" onclick="stopConfig()" style="display:none">Stop</button>
            </div>
            <div class="log-container" id="config-logs" style="flex:1; min-height:0;"></div>
        </div>
        <div class="resize-handle" id="handle1"></div>
        <div class="section" id="caches-section" style="flex: 1;">
            <div class="section-header">
                <span class="section-title">Caches</span>
                <button class="btn-start" onclick="startCache()">Add</button>
            </div>
            <div class="section-body" id="cache-panels">
                <div class="section-empty">No caches running</div>
            </div>
        </div>
        <div class="resize-handle" id="handle2"></div>
        <div class="section" id="clients-section" style="flex: 1;">
            <div class="section-header">
                <span class="section-title">Clients</span>
                <button class="btn-start" onclick="startClient()">Add</button>
            </div>
            <div class="section-body" id="client-panels">
                <div class="section-empty">No clients running</div>
            </div>
        </div>
    </div>

    <script>
        const panels = {};
        let configEventSource = null;

        async function startConfig() {
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type: 'config', port: ''})
                });
                if (!res.ok) { alert(await res.text()); return; }
                document.getElementById('config-start-btn').style.display = 'none';
                document.getElementById('config-stop-btn').style.display = '';
                const logEl = document.getElementById('config-logs');
                logEl.innerHTML = '';

                const es = new EventSource('/api/logs?name=config-service');
                configEventSource = es;
                let userScrolled = false;
                logEl.addEventListener('scroll', () => {
                    const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 30;
                    userScrolled = !atBottom;
                });
                es.onmessage = (e) => {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    const text = e.data;
                    if (text.includes('ERROR') || text.includes('error') || text.includes('panic')) {
                        line.className += ' error';
                    } else if (text.includes('[process exited]')) {
                        line.className += ' error';
                        document.getElementById('config-start-btn').style.display = '';
                        document.getElementById('config-stop-btn').style.display = 'none';
                    } else if (text.includes('Started') || text.includes('Added') || text.includes('Sent') || text.includes('Listening')) {
                        line.className += ' info';
                    } else {
                        line.className += ' highlight';
                    }
                    line.textContent = text;
                    logEl.appendChild(line);
                    if (!userScrolled) logEl.scrollTop = logEl.scrollHeight;
                };
                es.onerror = () => {
                    es.close();
                    document.getElementById('config-start-btn').style.display = '';
                    document.getElementById('config-stop-btn').style.display = 'none';
                };
            } catch (e) { alert('Failed to start: ' + e.message); }
        }

        async function stopConfig() {
            try {
                await fetch('/api/stop', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: 'config-service'})
                });
            } catch (e) { alert('Failed to stop: ' + e.message); }
        }

        async function startProcess(type, port) {
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type, port: port || ''})
                });
                if (!res.ok) {
                    alert(await res.text());
                    return;
                }
                const data = await res.json();
                createPanel(data.name, type, data.port);
            } catch (e) {
                alert('Failed to start: ' + e.message);
            }
        }

        function startCache() {
            startProcess('cache');
        }

        function startClient() {
            startProcess('client');
        }

        async function stopProcess(name) {
            try {
                await fetch('/api/stop', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name})
                });
            } catch (e) {
                alert('Failed to stop: ' + e.message);
            }
        }

        async function handleStopAll() {
            const btn = document.getElementById('stopAllBtn');
            if (btn.textContent === 'Clear All') {
                // Remove all panels
                for (const name of Object.keys(panels)) {
                    removePanel(name);
                }
                // Clear config logs
                document.getElementById('config-logs').innerHTML = '';
                btn.textContent = 'Stop All';
                return;
            }
            try {
                await fetch('/api/stop-all', {method: 'POST'});
                btn.textContent = 'Clear All';
            } catch (e) {
                alert('Failed to stop all: ' + e.message);
            }
        }

        function getTargetContainer(type) {
            switch (type) {
                case 'cache': return document.getElementById('cache-panels');
                case 'client': return document.getElementById('client-panels');
            }
        }

        function createPanel(name, type, port) {
            if (panels[name]) return;

            const container = getTargetContainer(type);
            // Remove empty state placeholder
            const empty = container.querySelector('.section-empty');
            if (empty) empty.remove();

            const panel = document.createElement('div');
            panel.className = 'panel';
            panel.id = 'panel-' + name;

            let label = name;
            if (type === 'config') label = 'Config Service';
            else if (type === 'cache') label = 'Cache :' + port;
            else if (type === 'client') label = 'Client :' + port;

            let commandBar = '';
            if (type === 'client') {
                commandBar = `
                    <div class="panel-command-bar">
                        <input type="text" class="panel-command-input" id="cmd-${name}"
                            placeholder="GET key  /  PUT key value"
                            onkeydown="if(event.key==='Enter')sendCommand('${name}')">
                        <button class="btn-start" onclick="sendCommand('${name}')">Send</button>
                        <span class="command-result" id="result-${name}"></span>
                    </div>
                `;
            }

            panel.innerHTML = `
                <div class="panel-header">
                    <span class="panel-title">${label}</span>
                    <button class="panel-stop" id="stopbtn-${name}" onclick="stopProcess('${name}')">Stop</button>
                </div>
                ${commandBar}
                <div class="log-container" id="logs-${name}"></div>
            `;

            container.appendChild(panel);

            // Connect SSE
            const es = new EventSource('/api/logs?name=' + encodeURIComponent(name));
            let userScrolled = false;
            const logEl = panel.querySelector('.log-container');

            logEl.addEventListener('scroll', () => {
                const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 30;
                userScrolled = !atBottom;
            });

            es.onmessage = (e) => {
                const line = document.createElement('div');
                line.className = 'log-line';
                const text = e.data;

                if (text.includes('ERROR') || text.includes('error') || text.includes('panic')) {
                    line.className += ' error';
                } else if (text.includes('[process exited]')) {
                    line.className += ' error';
                    const stopBtn = document.getElementById('stopbtn-' + name);
                    if (stopBtn) {
                        stopBtn.className = 'panel-delete';
                        stopBtn.textContent = 'Clear';
                        stopBtn.onclick = () => removePanel(name);
                    }
                } else if (text.includes('Started') || text.includes('Added') || text.includes('Sent') || text.includes('Listening')) {
                    line.className += ' info';
                } else {
                    line.className += ' highlight';
                }

                line.textContent = text;
                logEl.appendChild(line);

                if (!userScrolled) {
                    logEl.scrollTop = logEl.scrollHeight;
                }
            };

            es.onerror = () => {
                es.close();
            };

            panels[name] = { es, panel };
        }

        function removePanel(name) {
            const p = panels[name];
            if (p) {
                if (p.es) p.es.close();
                p.panel.remove();
                delete panels[name];
            }
        }

        async function sendCommand(clientName) {
            const input = document.getElementById('cmd-' + clientName);
            const result = document.getElementById('result-' + clientName);
            const cmd = input.value.trim();
            if (!cmd) return;

            result.textContent = '...';
            result.className = 'command-result';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd, client: clientName})
                });
                if (!res.ok) {
                    result.textContent = await res.text();
                    result.className = 'command-result error';
                    return;
                }
                const data = await res.json();
                result.textContent = `[${data.target}] ${data.response}`;
                result.className = 'command-result success';
            } catch (e) {
                result.textContent = e.message;
                result.className = 'command-result error';
            }
            input.value = '';
        }

        // On load, check for already-running processes
        async function refreshProcesses() {
            try {
                const res = await fetch('/api/processes');
                const procs = await res.json();
                if (procs) {
                    for (const p of procs) {
                        if (p.type === 'config') {
                            // Re-attach config logs
                            document.getElementById('config-start-btn').style.display = 'none';
                            document.getElementById('config-stop-btn').style.display = '';
                            startConfig(); // will re-connect SSE
                        } else {
                            createPanel(p.name, p.type, p.port);
                        }
                    }
                }
            } catch (e) {}
        }
        refreshProcesses();

        // Draggable column resize
        function initResize(handleId, leftSectionId, rightSectionId) {
            const handle = document.getElementById(handleId);
            const leftSection = document.getElementById(leftSectionId);
            const rightSection = document.getElementById(rightSectionId);
            const grid = document.getElementById('mainGrid');

            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';

                const startX = e.clientX;
                const startLeftWidth = leftSection.getBoundingClientRect().width;
                const startRightWidth = rightSection.getBoundingClientRect().width;

                function onMouseMove(e) {
                    const dx = e.clientX - startX;
                    const newLeft = Math.max(100, startLeftWidth + dx);
                    const newRight = Math.max(100, startRightWidth - dx);
                    leftSection.style.flex = 'none';
                    rightSection.style.flex = 'none';
                    leftSection.style.width = newLeft + 'px';
                    rightSection.style.width = newRight + 'px';
                }

                function onMouseUp() {
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        initResize('handle1', 'config-section', 'caches-section');
        initResize('handle2', 'caches-section', 'clients-section');
    </script>
</body>
</html>
